name: Update contributors

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-contributors
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate contributors block
        id: contributors
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const readmePath = 'README.md'
            const startMarker = '<!-- contributors:start -->'
            const endMarker = '<!-- contributors:end -->'

            const contributors = await github.paginate(
              github.rest.repos.listContributors,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              },
            )

            const profiles = contributors
              .filter(({ type }) => type === 'User')
              .map(({ login, html_url }) =>
                `  <a href="${html_url}"><img src="https://github.com/${login}.png?size=100" width="80" height="80" alt="${login}" title="${login}" /></a>`,
              )
              .join('\n')

            if (!profiles) {
              core.setFailed('The GitHub API returned no user contributors.')
              return
            }

            const readme = fs.readFileSync(readmePath, 'utf8')
            const start = readme.indexOf(startMarker)
            const end = readme.indexOf(endMarker)

            if (start === -1 || end === -1 || end <= start) {
              core.setFailed('Contributor markers were not found in README.md.')
              return
            }

            const updated =
              readme.slice(0, start + startMarker.length) +
              `\n${profiles}\n  ` +
              readme.slice(end)

            if (updated !== readme) {
              fs.writeFileSync(readmePath, updated)
              core.setOutput('changed', 'true')
            }

      - name: Commit updated README
        if: steps.contributors.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update contributors [skip ci]"
          git push
