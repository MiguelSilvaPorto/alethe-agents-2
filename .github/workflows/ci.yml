name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela runs antigos do mesmo branch/PR quando um novo chega.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install-script:
    name: install.sh validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate shell syntax
        run: bash -n scripts/install.sh

      - name: Check license header
        run: head -2 scripts/install.sh | grep -q '#!/usr/bin/env bash'

      - name: Run dry-run
        run: bash scripts/install.sh --dry-run

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      # node --test sobre tests/**/*.test.ts (strip-types nativo do Node).
      - name: Run unit tests
        run: npm test

      # `npm run build` = tsc (typecheck) + vite build. Falha se houver erro de tipo.
      - name: Typecheck and build
        run: npm run build

  rust:
    name: Rust check (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            label: Windows
          - platform: ubuntu-22.04
            label: Linux
          - platform: macos-latest
            label: macOS
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: cargo check
        working-directory: src-tauri
        run: cargo check

      - name: cargo test
        working-directory: src-tauri
        run: cargo test
