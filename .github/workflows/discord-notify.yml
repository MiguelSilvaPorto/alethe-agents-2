# Notifica o Discord (Kc1t AI Labs) sobre eventos do Alethe Agents.
#   release publicada  -> #alethe-releases (webhook DISCORD_WEBHOOK_ALETHE_RELEASES)
#   issue aberta/fechada + PR mergeado na branch padrao -> #alethe-updates (webhook DISCORD_WEBHOOK_ALETHE_UPDATES)
#
# release.yml (workflow_dispatch) builda e publica o GitHub Release com releaseDraft:false,
# entao o evento nativo `release: published` dispara este workflow sozinho. Nao precisa
# alterar o release.yml nem chamar este workflow explicitamente.
#
# Requer os 2 secrets do repo (Settings > Secrets and variables > Actions):
#   DISCORD_WEBHOOK_ALETHE_RELEASES, DISCORD_WEBHOOK_ALETHE_UPDATES
name: Discord notify

on:
  release:
    types: [published]
  issues:
    types: [opened, closed]
  # pull_request_target roda no contexto do repo base => tem acesso aos secrets.
  # So lemos metadados (titulo/corpo/url), nunca fazemos checkout de codigo do fork, entao e seguro.
  pull_request_target:
    types: [closed]

permissions:
  contents: read

# Evita disparo duplicado pro mesmo evento.
concurrency:
  group: discord-notify-${{ github.event_name }}-${{ github.event.release.id || github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    # PR so notifica se foi MERGEADO (nao apenas fechado) e na branch padrao (corta ruido de branch de teste).
    if: >-
      github.event_name != 'pull_request_target' ||
      (github.event.pull_request.merged == true &&
       github.event.pull_request.base.ref == github.event.repository.default_branch)
    env:
      WH_RELEASES: ${{ secrets.DISCORD_WEBHOOK_ALETHE_RELEASES }}
      WH_UPDATES: ${{ secrets.DISCORD_WEBHOOK_ALETHE_UPDATES }}
      KC1T_NAME: "Kc1t Assistant"
      KC1T_AVATAR: "https://cdn.discordapp.com/icons/1513496334236389397/9fcedc8b7f5d21a685c886e8adf6d835.png?size=256"
      COLOR: "2278750" # verde da marca #22c55e
      EVENT: ${{ github.event_name }}
      ACTION: ${{ github.event.action }}
      SITE: "https://alethe-agents.kc1t.com/"
    steps:
      - name: Montar e enviar embed
        env:
          # Dados crus passam por env (nunca interpolados direto no script) pra evitar injecao de shell.
          REL_TAG: ${{ github.event.release.tag_name }}
          REL_NAME: ${{ github.event.release.name }}
          REL_URL: ${{ github.event.release.html_url }}
          REL_BODY: ${{ github.event.release.body }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_USER: ${{ github.event.issue.user.login }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_USER: ${{ github.event.pull_request.user.login }}
          PR_NUM: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          # slice() corta string por CODEPOINT (via jq), nunca por byte, entao nao quebra acento/emoji.
          slice() { jq -rn --arg s "${1:-}" --argjson n "$2" '$s[0:$n]'; }

          WH=""; TITLE=""; URL=""; DESC=""; FOOTER=""

          case "$EVENT" in
            release)
              WH="$WH_RELEASES"
              if [ -n "${REL_NAME:-}" ]; then TITLE="🚀 $REL_NAME"; else TITLE="🚀 Alethe ${REL_TAG:-nova versao} disponivel"; fi
              URL="$REL_URL"
              BODY="$(slice "${REL_BODY:-Nova versao publicada.}" 3200)"
              DESC="$BODY

              📥 Baixar (Windows / macOS / Linux): $REL_URL
              🌐 $SITE"
              FOOTER="Alethe Agents • release ${REL_TAG:-}"
              ;;
            issues)
              WH="$WH_UPDATES"
              URL="$ISSUE_URL"
              if [ "$ACTION" = "opened" ]; then
                TITLE="🟢 Nova issue #${ISSUE_NUM}: ${ISSUE_TITLE}"
                DESC="$(slice "${ISSUE_BODY:-Sem descricao.}" 1500)"
                FOOTER="aberta por @${ISSUE_USER}"
              else
                TITLE="✅ Issue #${ISSUE_NUM} resolvida: ${ISSUE_TITLE}"
                DESC="Essa issue foi fechada. 🎉"
                FOOTER="Alethe Agents • issues"
              fi
              ;;
            pull_request_target)
              WH="$WH_UPDATES"
              URL="$PR_URL"
              TITLE="✨ Novidade mergeada: ${PR_TITLE}"
              DESC="$(slice "${PR_BODY:-Pull request mergeado na branch principal.}" 1800)"
              FOOTER="PR #${PR_NUM} por @${PR_USER}"
              ;;
            *)
              echo "Evento $EVENT nao tratado, saindo."; exit 0 ;;
          esac

          if [ -z "${WH:-}" ]; then
            echo "::warning::Webhook nao configurado pro evento $EVENT. Pulei o envio."
            exit 0
          fi

          # Trava nos limites do Discord (title 256, description 4096) por codepoint.
          TITLE="$(slice "$TITLE" 250)"
          DESC="$(slice "$DESC" 4000)"

          payload="$(jq -n \
            --arg username "$KC1T_NAME" \
            --arg avatar "$KC1T_AVATAR" \
            --arg title "$TITLE" \
            --arg url "$URL" \
            --arg desc "$DESC" \
            --arg footer "$FOOTER" \
            --argjson color "$COLOR" \
            '{username:$username, avatar_url:$avatar,
              embeds:[{title:$title, url:$url, description:$desc, color:$color,
                       footer:{text:$footer}}]}')"

          code="$(curl -sS -o /tmp/resp.txt -w '%{http_code}' \
            -H 'Content-Type: application/json' -X POST -d "$payload" "$WH")"
          echo "Discord respondeu HTTP $code"
          cat /tmp/resp.txt || true
          [ "$code" -ge 200 ] && [ "$code" -lt 300 ]
